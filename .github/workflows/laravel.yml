name: Laravel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # 2. Instalar PHP 8.3
      - name: Instalar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, xml, curl
          coverage: none

      # 3. Instalar dependencias Composer
      - name: Instalar dependencias Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # 4. Configurar entorno
      - name: Configurar archivo .env
        run: |
          cp .env.example .env
          php artisan key:generate

      # 5. Configurar SQLite para pruebas
      - name: Configurar base de datos SQLite
        run: |
          touch database/database.sqlite
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env

      # 6. Ejecutar migraciones
      - name: Ejecutar migraciones
        run: php artisan migrate --force

      # 7. Ejecutar seeders
      - name: Ejecutar seeders
        run: php artisan db:seed --force

      # 8. Ejecutar pruebas automáticas
      - name: Ejecutar pruebas automáticas
        run: php artisan test --stop-on-failure